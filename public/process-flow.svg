<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#00000012"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="300" fill="#fafafa" rx="20"/>

  <!-- ── Step 1: Telefoon of desktop ── -->
  <rect x="40" y="44" width="160" height="172" rx="16" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#card-shadow)"/>
  <!-- Step number -->
  <circle cx="62" cy="66" r="12" fill="#fef3c7"/>
  <text x="62" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">01</text>
  <!-- Laptop icon -->
  <rect x="84" y="76" width="28" height="19" rx="2.5" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <rect x="80" y="95" width="36" height="5" rx="2" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <!-- Phone icon -->
  <rect x="120" y="73" width="20" height="34" rx="4" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <line x1="120" y1="81" x2="140" y2="81" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="120" y1="99" x2="140" y2="99" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="130" cy="104" r="2.5" fill="#f59e0b"/>
  <!-- Text -->
  <text x="120" y="134" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Telefoon of desktop</text>
  <text x="120" y="151" text-anchor="middle" font-size="11" fill="#6b7280">Foto, scan of PDF</text>
  <text x="120" y="165" text-anchor="middle" font-size="11" fill="#6b7280">uploaden</text>

  <!-- Arrow 1 -->
  <line x1="204" y1="130" x2="232" y2="130" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <polygon points="229,124 241,130 229,136" fill="#d1d5db"/>

  <!-- ── Step 2: AI-analyse (amber highlight) ── -->
  <rect x="244" y="44" width="160" height="172" rx="16" fill="#f59e0b" filter="url(#card-shadow)"/>
  <!-- Step number -->
  <circle cx="266" cy="66" r="12" fill="#fef3c7" opacity="0.4"/>
  <text x="266" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="white">02</text>
  <!-- Sparkle icon -->
  <path d="M324 75 L327.5 88 L341 91.5 L327.5 95 L324 108 L320.5 95 L307 91.5 L320.5 88 Z" fill="white" opacity="0.95"/>
  <path d="M337 74 L339 80 L345 82 L339 84 L337 90 L335 84 L329 82 L335 80 Z" fill="white" opacity="0.6"/>
  <!-- Text -->
  <text x="324" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="white">Anthropic AI</text>
  <text x="324" y="149" text-anchor="middle" font-size="11" fill="#fef3c7">Herkent afzender,</text>
  <text x="324" y="163" text-anchor="middle" font-size="11" fill="#fef3c7">categorie en deadline</text>
  <!-- Privacy badge -->
  <rect x="264" y="188" width="120" height="22" rx="11" fill="#92400e" opacity="0.75"/>
  <text x="324" y="203" text-anchor="middle" font-size="10" font-weight="600" fill="white">🔒 foto verdwijnt direct</text>

  <!-- Arrow 2 -->
  <line x1="408" y1="130" x2="436" y2="130" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <polygon points="433,124 445,130 433,136" fill="#d1d5db"/>

  <!-- ── Step 3: Resultaat ── -->
  <rect x="448" y="44" width="160" height="172" rx="16" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#card-shadow)"/>
  <!-- Step number -->
  <circle cx="470" cy="66" r="12" fill="#fef3c7"/>
  <text x="470" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">03</text>
  <!-- Document/list icon -->
  <rect x="511" y="72" width="36" height="46" rx="5" fill="none" stroke="#f59e0b" stroke-width="2.2"/>
  <line x1="519" y1="86" x2="539" y2="86" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="519" y1="95" x2="539" y2="95" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="519" y1="104" x2="533" y2="104" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Text -->
  <text x="528" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Resultaat</text>
  <text x="528" y="160" text-anchor="middle" font-size="11" fill="#6b7280">Opgeslagen in</text>
  <text x="528" y="174" text-anchor="middle" font-size="11" fill="#6b7280">jouw account</text>
  <text x="528" y="188" text-anchor="middle" font-size="11" fill="#6b7280">+ actielijst</text>

  <!-- Arrow 3 -->
  <line x1="612" y1="130" x2="640" y2="130" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
  <polygon points="637,124 649,130 637,136" fill="#d1d5db"/>

  <!-- ── Step 4: Cloud of eigen opslag ── -->
  <rect x="652" y="44" width="160" height="172" rx="16" fill="white" stroke="#fde68a" stroke-width="1.5" filter="url(#card-shadow)"/>
  <!-- Step number -->
  <circle cx="674" cy="66" r="12" fill="#fef3c7"/>
  <text x="674" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">04</text>
  <!-- Cloud + down arrow icon -->
  <path d="M732 75 C725 75 719 80 718 87 C713 88 709 93 709 99 C709 105 714 110 720 110 L745 110 C751 110 756 105 756 99 C756 93 751 88 745 87 C744 80 739 75 732 75 Z" fill="none" stroke="#f59e0b" stroke-width="2.2"/>
  <line x1="732" y1="110" x2="732" y2="122" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="725,117 732,124 739,117" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="732" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Cloud of eigen opslag</text>
  <text x="732" y="163" text-anchor="middle" font-size="11" fill="#6b7280">OneDrive, Dropbox</text>
  <text x="732" y="177" text-anchor="middle" font-size="11" fill="#6b7280">of lokaal opslaan</text>
  <text x="732" y="191" text-anchor="middle" font-size="11" fill="#6b7280">Altijd van jou</text>

  <!-- Bottom tagline -->
  <text x="440" y="270" text-anchor="middle" font-size="12" fill="#9ca3af">NooitMeerPostKwijt · nooitmeerpostkwijt.nl</text>
</svg>
